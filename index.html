<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>My To-Do List</title>
        
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
    
    <div class="container">
        
        &nbsp; &nbsp; &nbsp;
        
        
        
        <h1>📝 Atul's To-Do List</h1>

        
        <button id="exportBtn">📥 Export Tasks</button>
        
        
        <button id="darkModeBtn">🌙 Dark Mode</button>
        
        <!-- Add Task -->
        <div class="input-box">
    <input
    type="text"
    id="taskInput"
        placeholder="Enter your task..."
    >

    <input
    type="date"
    id="dueDate"
    >
    
    <select id="priority">
        <option value="Low">🟢 Low</option>
        <option value="Medium">🟡 Medium</option>
        <option value="High">🔴 High</option>
    </select>
    
    
    
    <button id="addBtn">Add</button>
</div>

<button id="clearAllBtn">🗑️ Clear All</button>




<select id="sortTasks">
<option value="default">🔽 Sort Tasks</option>
<option value="az">🔤 A - Z</option>
<option value="priority">⭐ Priority</option>
<option value="date">📅 Due Date</option>
</select>

        <!-- Search -->
        <input
            type="text"
            id="searchInput"
            placeholder="🔍 Search tasks..."
            >

            <select id="categoryFilter">
    <option value="All">📂 All Categories</option>
    <option value="Work">💼 Work</option>
    <option value="Study">📚 Study</option>
    <option value="Personal">🏠 Personal</option>
    <option value="Shopping">🛒 Shopping</option>
</select>

            
            <select id="category">
            <option value="Work">💼 Work</option>
            <option value="Study">📚 Study</option>
            <option value="Personal">🏠 Personal</option>
            <option value="Shopping">🛒 Shopping</option>
            </select>
            &NonBreakingSpace; &NonBreakingSpace; &NonBreakingSpace; &NonBreakingSpace; &NonBreakingSpace;
        <!-- Filters -->
        <div class="filters">
            <button id="allBtn">All</button>
            <button id="completedBtn">Completed</button>
            <button id="pendingBtn">Pending</button>
        </div>

<div class="task-stats">
    <p>Total: <span id="totalTasks">0</span></p>
    <p>Completed: <span id="completedTasks">0</span></p>
    <p>Pending: <span id="pendingTasks">0</span></p>
</div>

<div class="progress-container">
    <div id="progressBar"></div>
</div>

<p id="progressText">0% Complete</p>
        <!-- Task List -->
        <ul id="taskList"></ul>

    </div>
    
<ul id="taskList"></ul>

<div id="toast"></div>

    <script src="script.js"></script>

</body>
</html>
